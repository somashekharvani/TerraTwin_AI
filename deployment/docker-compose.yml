version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: terratwin-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: terratwin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mqtt:
    image: eclipse-mosquitto:latest
    container_name: terratwin-mqtt
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"

volumes:
  pgdata:
